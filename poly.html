<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Love ❤️‍🔥 </title>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --balloon1-bg-color: #ff1493e6;
            --balloon2-bg-color: #ff69b4e6;
            --balloon3-bg-color: #ff3366e3;
            --balloon4-bg-color: #ff6ec7d6;
            --balloon5-bg-color: #ff1493e6;
            --bg-pattern-color: #fce4ec;
            --globe-width: 12px;
            --globe-height: 28px;
            --globe-spacing: 40px;
            --globe-spread: 3px;
            --light-off-opacity: 0.4;

            /* ============ Bunting Color Palette ============ */
            --bunting-primary: #FFB6D9;        /* Light Pink */
            --bunting-secondary: #FFC5E0;      /* Blush Pink */
            --bunting-accent: #FFFFFF;         /* White */
            --bunting-cream: #FFF5F0;          /* Cream */
            --bunting-gold: #FFD4A3;           /* Soft Gold */
            --bunting-string: #D4A5A5;         /* Muted mauve for string */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #ffd6e8 0%, #fff4f0 25%, #e0f4ff 75%, #ffe0f0 100%);
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px 20px;
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 10;
            gap: 30px;
            padding-top: 50px;
            padding-bottom: 30px;
        }

        .happy,
        .birthday {
            flex-direction: row;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .name {
            display: flex;
            justify-content: center;
            padding: 20px;
            font-size: 60px;
            color: #8b6a60;
            font-family: "Comic Sans MS", Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        .balloon {
            width: 76px;
            height: 100px;
            margin: 10px;
            border-radius: 80%;
            position: relative;
        }

            .balloon::after {
                position: absolute;
                bottom: -16px;
                left: 31px;
                content: "\2713";
                transform: rotate(180deg);
                font-weight: bold;
                font-size: 16px;
            }

        .happy .balloon::before,
        .birthday .balloon::before {
            position: absolute;
            top: calc(50% - 15px);
            left: calc(50% - 10px);
            font-size: 30px;
            color: white;
            font-family: "Comic Sans MS", Arial, Helvetica, sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Happy balloons */
        .happy .balloon:nth-child(1)::before {
            content: "H";
        }

        .happy .balloon:nth-child(2)::before {
            content: "A";
        }

        .happy .balloon:nth-child(3)::before {
            content: "P";
        }

        .happy .balloon:nth-child(4)::before {
            content: "P";
        }

        .happy .balloon:nth-child(5)::before {
            content: "Y";
        }

        /* Birthday balloons */
        .birthday .balloon:nth-child(1)::before {
            content: "M";
        }

        .birthday .balloon:nth-child(2)::before {
            content: "O";
        }

        .birthday .balloon:nth-child(3)::before {
            content: "R";
        }

        .birthday .balloon:nth-child(4)::before {
            content: "T";
        }

        .birthday .balloon:nth-child(5)::before {
            content: "Y";
        }

        .birthday .balloon:nth-child(6)::before {
            content: "D";
        }

        .birthday .balloon:nth-child(7)::before {
            content: "A";
        }

        .birthday .balloon:nth-child(8)::before {
            content: "Y";
        }

        /* Animations */
        @keyframes balloon1 {
            0%, 100% {
                transform: translate(0, 0) rotate(-10deg);
            }

            50% {
                transform: translate(0, 30px) rotate(10deg);
            }
        }

        @keyframes balloon2 {
            0%, 100% {
                transform: translate(-20px, 40px) rotate(15deg);
            }

            50% {
                transform: translate(0, -10px) rotate(-5deg);
            }
        }

        @keyframes balloon3 {
            0%, 100% {
                transform: translate(-30px, 0) rotate(-10deg);
            }

            50% {
                transform: translate(0, -20px) rotate(20deg);
            }
        }

        @keyframes balloon4 {
            0%, 100% {
                transform: translate(-10px, 0) rotate(0deg);
            }

            50% {
                transform: translate(0, 20px) rotate(30deg);
            }
        }

        @keyframes balloon5 {
            0%, 100% {
                transform: translate(10px, 0) rotate(20deg);
            }

            50% {
                transform: translate(0, 30px) rotate(-20deg);
            }
        }

        @keyframes balloon7 {
            0%, 100% {
                transform: translate(0, 0) rotate(15deg);
            }

            50% {
                transform: translate(0, 0) rotate(-15deg);
            }
        }

        /* Balloon colors - vibrant and cheerful */
        .balloon1 {
            background: var(--balloon1-bg-color);
            box-shadow: inset 10px 10px 15px rgba(200, 0, 100, 0.3), 0 5px 15px rgba(255, 20, 147, 0.4);
        }

            .balloon1::after {
                color: var(--balloon1-bg-color);
            }

        .balloon2 {
            background: var(--balloon2-bg-color);
            box-shadow: inset 10px 10px 15px rgba(220, 50, 150, 0.3), 0 5px 15px rgba(255, 105, 180, 0.4);
        }

            .balloon2::after {
                color: var(--balloon2-bg-color);
            }

        .balloon3 {
            background: var(--balloon3-bg-color);
            box-shadow: inset 10px 10px 15px rgba(220, 30, 80, 0.3), 0 5px 15px rgba(255, 51, 102, 0.4);
        }

            .balloon3::after {
                color: var(--balloon3-bg-color);
            }

        .balloon4 {
            background: var(--balloon4-bg-color);
            box-shadow: inset 10px 10px 15px rgba(230, 80, 170, 0.3), 0 5px 15px rgba(255, 110, 199, 0.4);
        }

            .balloon4::after {
                color: var(--balloon4-bg-color);
            }

        .balloon5 {
            background: var(--balloon5-bg-color);
            box-shadow: inset 10px 10px 15px rgba(200, 0, 100, 0.3), 0 5px 15px rgba(255, 20, 147, 0.4);
        }

            .balloon5::after {
                color: var(--balloon5-bg-color);
            }

        /* Animation classes */
        .balloon-anim1 {
            animation: balloon1 15s ease infinite;
        }

        .balloon-anim2 {
            animation: balloon2 5s ease infinite;
        }

        .balloon-anim3 {
            animation: balloon3 10s ease infinite;
        }

        .balloon-anim4 {
            animation: balloon4 5s ease infinite;
        }

        .balloon-anim5 {
            animation: balloon5 15s ease infinite;
        }

        .balloon-anim6 {
            animation: balloon7 5s ease infinite;
        }

        /* ============================================== Light Rope Styles */

        .lightrope {
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            position: absolute;
            z-index: 20;
            margin: -15px 0 0 0;
            padding: 0;
            pointer-events: none;
            width: 100%;
            top: 0;
            left: 0;
        }

            .lightrope li {
                position: relative;
                animation-fill-mode: both;
                animation-iteration-count: infinite;
                list-style: none;
                margin: 0;
                padding: 0;
                display: inline-block;
                width: var(--globe-width);
                height: var(--globe-height);
                border-radius: 50%;
                margin: calc(var(--globe-spacing) / 2);
                background: rgba(0, 247, 165, 1);
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 247, 165, 1);
                animation-name: flash-1;
                animation-duration: 2s;
            }

                .lightrope li:nth-child(2n+1) {
                    background: rgba(0, 255, 255, 1);
                    box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 255, 255, 0.5);
                    animation-name: flash-2;
                    animation-duration: 0.4s;
                }

                .lightrope li:nth-child(4n+2) {
                    background: rgba(247, 0, 148, 1);
                    box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(247, 0, 148, 1);
                    animation-name: flash-3;
                    animation-duration: 1.1s;
                }

                .lightrope li:nth-child(odd) {
                    animation-duration: 1.8s;
                }

                .lightrope li:nth-child(3n+1) {
                    animation-duration: 1.4s;
                }

                .lightrope li::before {
                    content: "";
                    position: absolute;
                    background: #222;
                    width: calc(var(--globe-width) - 2px);
                    height: calc(var(--globe-height) / 3);
                    border-radius: 3px;
                    top: calc(0 - calc(var(--globe-height) / 6));
                    left: 1px;
                }

                .lightrope li::after {
                    content: "";
                    top: calc(0 - calc(var(--globe-height) / 2));
                    left: calc(var(--globe-width) - 3px);
                    position: absolute;
                    width: calc(var(--globe-spacing) + 12px);
                    height: calc(var(--globe-height) / 3 * 2);
                    border-bottom: solid #222 2px;
                    border-radius: 50%;
                }

                .lightrope li:last-child::after {
                    content: none;
                }

                .lightrope li:first-child {
                    margin-left: calc(0 - var(--globe-spacing));
                }

        /* Light rope animations */
        @keyframes flash-1 {
            0%, 100% {
                background: rgba(0, 247, 165, 1);
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 247, 165, 1);
            }

            50% {
                background: rgba(0, 247, 165, var(--light-off-opacity));
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 247, 165, 0.2);
            }
        }

        @keyframes flash-2 {
            0%, 100% {
                background: rgba(0, 255, 255, 1);
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 255, 255, 1);
            }

            50% {
                background: rgba(0, 255, 255, var(--light-off-opacity));
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(0, 255, 255, 0.2);
            }
        }

        @keyframes flash-3 {
            0%, 100% {
                background: rgba(247, 0, 148, 1);
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(247, 0, 148, 1);
            }

            50% {
                background: rgba(247, 0, 148, var(--light-off-opacity));
                box-shadow: 0px calc(var(--globe-height) / 6) calc(var(--globe-width) * 2) var(--globe-spread) rgba(247, 0, 148, 0.2);
            }
        }

        /* ============================================== Photo Frame Gallery Styles */

        a {
            color: #000;
        }

        .row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .framed-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 4rem;
            justify-items: center;
            max-width: 90%;
            margin: 2rem auto;
        }

        .frame {
            background: white;
            padding: 1rem 1rem 2rem 1rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            border-radius: 2px;
            aspect-ratio: 1 / 1.2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            transition: transform 0.3s ease;
        }

            .frame img {
                width: 100%;
                object-fit: cover;
                aspect-ratio: 1/1;
                border-radius: 2px;
            }

            .frame:hover {
                transform: rotate(-1deg) scale(1.03);
            }

        .caption {
            margin-top: 1rem;
            font-family: "Patrick Hand", cursive;
            font-size: 1rem;
            color: #333;
            text-align: center;
        }

        /* ============================================== Responsive Styles */

        /* Tablets (768px and above) */
        @media (max-width: 768px) {
            body {
                padding: 30px 15px;
            }

            .content-wrapper {
                padding-top: 30px;
                gap: 20px;
            }

            .name {
                font-size: 40px;
                padding: 15px;
            }

            .balloon {
                width: 60px;
                height: 80px;
                margin: 8px;
            }

                .balloon::after {
                    left: 24px;
                    font-size: 14px;
                    bottom: -12px;
                }

            .happy .balloon::before,
            .birthday .balloon::before {
                font-size: 24px;
                top: calc(50% - 12px);
                left: calc(50% - 8px);
            }

            .framed-gallery {
                max-width: 95%;
                gap: 2rem;
            }

            .frame {
                aspect-ratio: 1 / 1.2;
            }

            :root {
                --globe-spacing: 30px;
                --globe-width: 10px;
                --globe-height: 24px;
            }
        }

        /* Mobile devices (480px and below) */
        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
            }

            .content-wrapper {
                padding-top: 20px;
                gap: 15px;
            }

            .name {
                font-size: 28px;
                padding: 10px;
            }

            .balloon {
                width: 50px;
                height: 65px;
                margin: 5px;
            }

                .balloon::after {
                    left: 20px;
                    font-size: 12px;
                    bottom: -10px;
                }

            .happy .balloon::before,
            .birthday .balloon::before {
                font-size: 18px;
                top: calc(50% - 9px);
                left: calc(50% - 6px);
            }

            .framed-gallery {
                grid-template-columns: 1fr;
                max-width: 100%;
                gap: 2rem;
                margin: 1rem auto;
            }

            .frame {
                aspect-ratio: 1 / 1.2;
                max-width: 250px;
            }

            .caption {
                font-size: 0.9rem;
            }

            :root {
                --globe-spacing: 20px;
                --globe-width: 8px;
                --globe-height: 18px;
            }

            .happy,
            .birthday {
                gap: 2px;
            }

            .planes-container {
                height: 35vh;
                min-height: 250px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .wrapper {
                position: relative;
                height: 100%;
            }
        }

        /* Extra small devices (320px) */
        @media (max-width: 360px) {
            body {
                padding: 15px 8px;
            }

            .content-wrapper {
                padding-top: 15px;
                gap: 12px;
            }

            .name {
                font-size: 22px;
                padding: 8px;
            }

            .framed-gallery {
                grid-template-columns: 1fr;
                max-width: 100%;
                gap: 1.5rem;
                margin: 1rem auto;
            }

            .frame {
                aspect-ratio: 1 / 1.2;
                max-width: 200px;
                padding: 0.75rem 0.75rem 1.5rem 0.75rem;
            }

            .caption {
                font-size: 0.8rem;
                margin-top: 0.75rem;
            }

            .row {
                font-size: 0.85rem;
            }

            :root {
                --globe-spacing: 15px;
                --globe-width: 6px;
                --globe-height: 14px;
            }

            .happy,
            .birthday {
                gap: 1px;
            }

            .planes-container {
                height: 30vh;
                min-height: 200px;
            }
        }

        .button-group {
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
            display: flex;
        }

        .back-btn,
        .card-btn,
        .play-btn {
            padding: 18px 50px;
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.75), rgba(255, 105, 180, 0.75));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-size: 1.1em;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(255, 20, 147, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

            .back-btn:hover,
            .card-btn:hover,
            .play-btn:hover {
                transform: scale(1.12);
                box-shadow: 0 12px 40px rgba(255, 20, 147, 0.5);
                background: linear-gradient(135deg, rgba(255, 20, 147, 0.9), rgba(255, 105, 180, 0.9));
                border-color: rgba(255, 255, 255, 0.8);
            }

            .back-btn:active,
            .card-btn:active,
            .play-btn:active {
                transform: scale(0.98);
            }

        /* Responsive button group */
        @media (max-width: 768px) {
            .button-group {
                gap: 15px;
                margin-top: 25px;
            }

            .back-btn,
            .card-btn,
            .play-btn {
                padding: 16px 40px;
                font-size: 1em;
            }
        }

        @media (max-width: 480px) {
            .button-group {
                gap: 12px;
                margin-top: 20px;
            }

            .back-btn,
            .card-btn,
            .play-btn {
                padding: 14px 32px;
                font-size: 0.95em;
            }
        }

        @media (max-width: 360px) {
            .button-group {
                gap: 10px;
                margin-top: 15px;
            }

            .back-btn,
            .card-btn,
            .play-btn {
                padding: 12px 24px;
                font-size: 0.85em;
                letter-spacing: 0px;
            }
        }

        /* ============ Flying Planes Styles ============ */
        .pointer-events-none { 
            pointer-events: none; 
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
        }

        @media screen and (max-height: 320px) {
            .wrapper {
                margin-top: -40px;
            }
        }

        .flex_wrapper {
            width: 100%;
            padding-left: calc(20% + 100px);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            opacity: 0;
        }

        .plane_wrapper {
            position: absolute;
            display: flex;
            align-items: center;
        }

        .sprite_container {
            position: relative;
            width: 60px;
            height: 60px;
            overflow: hidden;
        }

        .sprite {
            position: absolute;
            height: 60px;
            width: 120px;
            transform-origin: center bottom;
        }

        .rope {
            margin: 0 -2px 0 -22px;
            height: 60px;
            width: 60px;
            z-index: -1;
            transform-origin: center left;
            transition: 0.4s;
        }

        .message_ghost,
        .message {
            height: 30px;
            line-height: 30px;
            background-color: white;
            color: navy;
            padding: 0px 8px;
            font-family: 'Press Start 2P', cursive;
        }

        .module {
            position: relative;
            transition: 0.7s ease-in-out;
        }

        .front { 
            display: flex; 
        }

        /* Planes Container - Separate from main content */
        .planes-container {
            position: relative;
            padding: 1%;
            top: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            min-height: 300px;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        /* Main Content Container */
        .content-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <!-- Flying Planes Section in Separate Container -->
    <div class="planes-container">
        <div class="wrapper pointer-events-none"></div>
        <div class="flex_wrapper pointer-events-none"></div>
    </div>

    <div class="content-wrapper">
        <div class="framed-gallery">
            <div class="frame">
                <img src="pic1.jfif" alt="My comfort Zone" />
                <span class="caption">My comfort Zone</span>
            </div>

            <div class="frame">
                <img src="pic2.jfif" alt="The Spark for my Soul" />
                <span class="caption">The Spark for my Soul</span>
            </div>

            <div class="frame">
                <img src="pic3.jfif" alt="My Forever" />
                <span class="caption">My Forever</span>
            </div>
        </div>

        <div class="button-group">
            <button class="back-btn" onclick="window.history.back()">Back</button>
            <button class="card-btn" onclick="window.location.href='card.html'">Card</button>
            <button class="play-btn" onclick="window.location.href='game.html'">Play</button>
        </div>
    </div>

    <script>
    function triggerConfetti() {
        // Left side - shoots from left towards right
        confetti({
            particleCount: 100,
            angle: 0,
            spread: 45,
            origin: { x: -0.1, y: 0.2 },
            colors: ['#FF69B4', '#FFB6D9', '#FFC5E0', '#FFA0D2', '#FFCCE6']
        });

        // Right side - shoots from right towards left
        confetti({
            particleCount: 100,
            angle: 180,
            spread: 45,
            origin: { x: 1.1, y: 0.2 },
            colors: ['#FF69B4', '#FFB6D9', '#FFC5E0', '#FFA0D2', '#FFCCE6']
        });

        // Top side - shoots from top towards bottom
        confetti({
            particleCount: 100,
            angle: 90,
            spread: 45,
            origin: { x: 0.5, y: -0.2 },
            colors: ['#FF69B4', '#FFB6D9', '#FFC5E0', '#FFA0D2', '#FFCCE6']
        });

        // Bottom side - shoots from bottom towards top
        confetti({
            particleCount: 100,
            angle: 270,
            spread: 45,
            origin: { x: 0.5, y: -0.5 },
            colors: ['#FF69B4', '#FFB6D9', '#FFC5E0', '#FFA0D2', '#FFCCE6']
        });
    }

    // Keep confetti firing at intervals after initial trigger
    setInterval(() => {
        triggerConfetti();
    }, 4000);

    /* ============ Flying Planes Script ============ */
    function initFlyingPlanes() {
        const colors = [
            {
                a: 'navy',
                b: '#fff',
                c: '#f3e412',
                d: '#0482d6',
            },
            {
                a: '#f83b3b',
                b: 'pink',
                c: 'yellow',
                d: '#fc65c9',
            },
            {
                a: '#fff',
                b: '#3b3bca',
                c: '#9953f5',
                d: '#67fdf1',
            },
            {
                a: 'navy',
                b: '#a6e1fc',
                c: '#9df312',
                d: '#ffef5d',
            }
        ]

        const planeSvg = () => {
            const { a, b, c, d } = colors[Math.floor(Math.random() * colors.length)]
            return `<svg x="0px" y="0px" width="100%" height="100%" viewBox="0 0 52 26"><path fill="${a}" d="M 35 2h1v1h-1v-1"/> <path fill="${a}" d="M 42 2h1v1h-1v-1"/> <path fill="${a}" d="M 9 3h1v1h-1v-1"/> <path fill="${a}" d="M 16 3h1v1h-1v-1"/> <path fill="${a}" d="M 34 3h1v6h-1v-6"/> <path fill="${b}" d="M 35 3h1v1h1v1h4v-1h1v-1h1v6h-1v1h-6v-1h-1v-6"/> <path fill="${a}" d="M 36 3h1v1h-1v-1"/> <path fill="${a}" d="M 41 3h1v1h-1v-1"/> <path fill="${a}" d="M 43 3h1v6h-1v-6"/> <path fill="${a}" d="M 8 4h1v6h-1v-6"/> <path fill="${b}" d="M 9 4h1v1h1v1h4v-1h1v-1h1v6h-1v1h-6v-1h-1v-6"/> <path fill="${a}" d="M 10 4h1v1h-1v-1"/> <path fill="${a}" d="M 15 4h1v1h-1v-1"/> <path fill="${a}" d="M 17 4h1v6h-1v-6"/> <path fill="${a}" d="M 37 4h4v1h-4v-1"/> <path fill="${a}" d="M 11 5h4v1h-4v-1"/> <path fill="${c}" d="M 23 6h2v6h-1v-1h-1v-1h-3v-1h1v-1h1v-1h1v-1"/> <path fill="${a}" d="M 36 6h1v2h-1v-2"/> <path fill="${a}" d="M 41 6h1v2h-1v-2"/> <path fill="${c}" d="M 49 6h2v6h-1v-1h-1v-1h-3v-1h1v-1h1v-1h1v-1"/> <path fill="${a}" d="M 10 7h1v2h-1v-2"/> <path fill="${a}" d="M 15 7h1v2h-1v-2"/> <path fill="${a}" d="M 38 8h2v1h-2v-1"/> <path fill="${a}" d="M 12 9h2v1h-2v-1"/> <path fill="${a}" d="M 35 9h1v1h-1v-1"/> <path fill="${a}" d="M 42 9h1v1h-1v-1"/> <path fill="${d}" d="M 5 10h3v1h1v1h1v1h6v-1h1v-1h1v-1h5v1h1v1h1v2h-4v1h1v1h1v1h-1v1h-5v-3h-1v-1h-6v1h-1v3h-6v-1h-1v-1h-1v-3h1v-1h1v-1h2v-1"/> <path fill="${c}" d="M 8 10h1v1h-1v-1"/> <path fill="${a}" d="M 9 10h1v1h-1v-1"/> <path fill="${a}" d="M 16 10h1v1h-1v-1"/> <path fill="${c}" d="M 17 10h1v1h-1v-1"/> <path fill="${d}" d="M 31 10h3v1h1v1h1v1h6v-1h1v-1h1v-1h5v1h1v1h1v2h-4v1h1v1h1v1h-1v1h-5v-3h-1v-1h-6v1h-1v3h-6v-1h-1v-1h-1v-3h1v-1h1v-1h2v-1"/> <path fill="${c}" d="M 34 10h1v1h-1v-1"/> <path fill="${b}" d="M 35 10h1v1h-1v-1"/> <path fill="${a}" d="M 36 10h6v1h-6v-1"/> <path fill="${b}" d="M 42 10h1v1h-1v-1"/> <path fill="${c}" d="M 43 10h1v1h-1v-1"/> <path fill="${c}" d="M 9 11h1v1h-1v-1"/> <path fill="${a}" d="M 10 11h6v1h-6v-1"/> <path fill="${c}" d="M 16 11h1v1h-1v-1"/> <path fill="${c}" d="M 35 11h1v1h-1v-1"/> <path fill="${b}" d="M 36 11h6v1h-6v-1"/> <path fill="${c}" d="M 42 11h1v1h-1v-1"/> <path fill="${c}" d="M 10 12h6v1h-6v-1"/> <path fill="${c}" d="M 36 12h6v1h-6v-1"/> <path fill="${c}" d="M 10 14h6v1h1v7h-1v1h-3v-1h-1v-1h-1v-1h-1v-1h-1v-4h1v-1"/> <path fill="${c}" d="M 21 14h4v4h-1v-1h-1v-1h-1v-1h-1v-1"/> <path fill="${c}" d="M 36 14h6v1h1v7h-1v1h-3v-1h-1v-1h-1v-1h-1v-1h-1v-4h1v-1"/> <path fill="${c}" d="M 47 14h4v4h-1v-1h-1v-1h-1v-1h-1v-1"/></svg>`
        }

        const rope = () => {
            const a = '#fff'
            return `
            <div class="rope">
                <svg x="0px" y="0px" width="100%" height="100%" viewBox="0 0 26 26">
                    <path fill="${a}" d="M 24 9h1v1h-1v-1"/> <path fill="${a}" d="M 23 10h1v1h-1v-1"/> <path fill="${a}" d="M 22 11h1v1h-1v-1"/> <path fill="${a}" d="M 21 12h1v1h-1v-1"/> <path fill="${a}" d="M 1 13h20v1h-20v-1"/> <path fill="${a}" d="M 21 14h1v1h-1v-1"/> <path fill="${a}" d="M 22 15h1v1h-1v-1"/> <path fill="${a}" d="M 23 16h1v1h-1v-1"/> <path fill="${a}" d="M 24 17h1v1h-1v-1"/>
                </svg>
            </div>`
        }

        const planeTimer = []
        const wrapper = document.querySelector('.wrapper')
        const cellD = 60
        const topValues = [0.5, 1.5, 2.5, 3.5]
        const bannerContent = 'Welcome#dear#future#husband#to#your#very#own#birthday#website'
        const banners = []
        let spriteId = 0
        let topIndex = 3
        let count = 0
        let bannerIndex = 0

        const animate = (actor, frame, cellD) => {
            const leftV = +(actor.style.left).replace('px', '')
            let newLeftV = leftV - cellD
            newLeftV = newLeftV < ((-1 * (frame - 1)) * cellD) ? 0 : newLeftV
            actor.style.left = `${newLeftV}px`
        }

        const bop = (actors, index) => {
            const actor = actors[index]
            const motion = 6
            const topV = actor.dataset.top ? actor.dataset.top : motion
            const newTopV = +topV === motion ? -motion : motion
            actor.style.top = `${newTopV}px`
            actor.dataset.top = newTopV
            if (actor.classList.contains('front')) actor.childNodes[3].style.transform = `rotate(${newTopV / (motion / -2)}deg)`
            setTimeout(() => {
                const newIndex = index >= (actors.length - 1) ? 0 : index + 1
                bop(actors, newIndex)
            }, 120)
        }

        const mapModules = words => {
            return words.map(word => {
                return `
                <div class="message module module_${spriteId}">
                    ${word}
                </div>
                `
            }).join('')
        }

        const createPlane = sentence => {
            const plane = document.createElement('div')
            spriteId++
            plane.classList.add('plane_wrapper')
            plane.innerHTML = `
            <div class="front module module_${spriteId}">
                <div class="sprite_container">
                    <div class="sprite sprite_${spriteId}">
                        ${planeSvg()}
                    </div>    
                </div>
                ${rope()}
            </div>    
            ${mapModules(sentence.split(' '))}
            `
            wrapper.append(plane)
            const sprite = document.querySelector(`.sprite_${spriteId}`)
            setInterval(() => {
                animate(sprite, 2, cellD)
            }, 200)
            const modules = document.querySelectorAll(`.module_${spriteId}`)
            bop(modules, 0)
            topIndex = (topIndex + 1) < topValues.length
                ? topIndex + 1
                : 0

            if (count === banners.length) {
                topIndex = 0
                count = 0
                return
            }
            plane.style.top = `${topValues[topIndex] * plane.offsetHeight + (20 * topValues[topIndex])}px`

            plane.style.left = '100%'
            plane.style.transition = '6s ease'

            planeTimer[bannerIndex].timerOne = setTimeout(() => {
                plane.style.left = '10%'
            }, 100)
            planeTimer[bannerIndex].timerTwo = setTimeout(() => {
                plane.style.left = `-${plane.offsetWidth + 200}px`
            }, 8000)
            planeTimer[bannerIndex].timerThree = setTimeout(() => {
                wrapper.removeChild(plane)
                const planeNo = document.querySelectorAll('.plane_wrapper').length
                if ((count === banners.length && planeNo < banners.length)) {
                    topIndex = 3
                    count = 0
                    createPlanes()
                }
            }, 30000)
        }

        const calcWrapIndex = () => {
            const flexWrapper = document.querySelector('.flex_wrapper')
            const wrapIndex = []
            flexWrapper.innerHTML = bannerContent.split('#').map(word => {
                return `
                    <div class="message_ghost">
                        ${word}
                    </div>
                `
            }).join('')
            const messageGhosts = document.querySelectorAll('.message_ghost')
            messageGhosts.forEach((message, i) => {
                if (i === (messageGhosts.length - 1)) return
                if (message.getBoundingClientRect().y < messageGhosts[i + 1].getBoundingClientRect().y) {
                    wrapIndex.push(i)
                }
            })
            return wrapIndex
        }

        const splitTextForBanners = () => {
            banners.length = 0
            const word = []
            const wrapIndex = calcWrapIndex()
            let hashCount = -1
            bannerContent.split('').forEach((letter, i) => {
                if (letter === '#') hashCount++
                word.push(letter)
                if ((wrapIndex.find(i => i === hashCount) && letter === '#')) {
                    banners.push(word.join(''))
                    word.length = 0
                }
                if (i === (bannerContent.length - 1)) banners.push(word.join(''))
            })
        }

        const createTimers = () => {
            planeTimer.length = 0
            banners.forEach(() => {
                planeTimer.push({
                    timerOne: null,
                    timerTwo: null,
                    timerThree: null,
                })
            })
        }

        const createPlanes = () => {
            const bannerText = banners[bannerIndex].split('').reverse().join('')[0] === '#'
                ? banners[bannerIndex]
                : banners[bannerIndex] += '#'

            if (bannerText !== '#') createPlane(bannerText.replaceAll('#', ' '))
            bannerIndex = (bannerIndex + 1) < banners.length
                ? bannerIndex + 1
                : 0

            if (bannerIndex === 0) spriteId = 0

            count++
            setTimeout(() => {
                if (count === banners.length) return
                createPlanes()
            }, 3000)
        }

        splitTextForBanners()
        createTimers()
        createPlanes()

        window.addEventListener('resize', () => {
            planeTimer.forEach(timers => {
                clearTimeout(timers.timerOne)
                clearTimeout(timers.timerTwo)
                clearTimeout(timers.timerThree)
            })
            wrapper.innerHTML = ''
            spriteId = 0
            topIndex = 3
            count = 0
            bannerIndex = 0
            splitTextForBanners()
            createTimers()
            createPlanes()
        })
    }

    window.addEventListener('DOMContentLoaded', initFlyingPlanes)
    </script>
</body>
